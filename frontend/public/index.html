<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title>智能课程助教聊天机器人</title>
    <meta name="description" content="基于AI的智能课程助教，为学生提供7x24小时的学习辅导">
    <meta name="keywords" content="智能助教,AI聊天,课程辅导,学习助手">
    <style>
      /* 预加载样式，避免页面闪烁 */
      #app {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      }
      
      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e4e7ed;
        border-top: 4px solid #409EFF;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .loading-text {
        margin-top: 15px;
        color: #666;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 20px; text-align: center; color: #f56c6c;">
        <h3>抱歉，您需要启用JavaScript才能运行此应用</h3>
        <p>请在浏览器设置中启用JavaScript，然后刷新页面。</p>
      </div>
    </noscript>
    <div id="app">
      <!-- 加载动画 -->
      <div class="loading-container">
        <div>
          <div class="loading-spinner"></div>
          <div class="loading-text">智能课程助教加载中...</div>
        </div>
      </div>
    </div>
  </body>
</html>
